name: Sync upstream opencloud-compose

on:
  schedule:
    # täglich 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup git
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

      - name: Add upstream remote
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/opencloud-eu/opencloud-compose.git
          git fetch --prune upstream

      - name: Determine upstream state
        id: state
        run: |
          set -eu
          NEW_UPSTREAM="$(git rev-parse upstream/main)"
          OLD_UPSTREAM="$(cat .github/upstream-main.sha 2>/dev/null || echo "")"

          echo "new_upstream=$NEW_UPSTREAM" >> "$GITHUB_OUTPUT"
          echo "old_upstream=$OLD_UPSTREAM" >> "$GITHUB_OUTPUT"

          if [ -n "$OLD_UPSTREAM" ] && [ "$OLD_UPSTREAM" = "$NEW_UPSTREAM" ]; then
            echo "updates=false" >> "$GITHUB_OUTPUT"
            echo "Upstream unchanged -> skip."
          else
            echo "updates=true" >> "$GITHUB_OUTPUT"
            echo "Upstream changed -> proceed."
          fi

      - name: Generate changelog (since last synced upstream SHA)
        run: |
          set -eu

          OLD="${{ steps.state.outputs.old_upstream }}"
          NEW="${{ steps.state.outputs.new_upstream }}"

          {
            echo "Dieser PR synced \`upstream/main\` in deinen Fork (squash)."
            echo
            echo "### Upstream Changelog"
            if [ -n "$OLD" ]; then
              echo "_Commits in upstream/main since last synced upstream SHA \`$OLD\`_"
              echo
              git log --no-merges --pretty=format:'- %h %s (%an)' "${OLD}..${NEW}"
            else
              echo "_Erster Lauf ohne State-Datei. Zeige die letzten 50 Commits von upstream/main:_"
              echo
              git log --no-merges -n 50 --pretty=format:'- %h %s (%an)' "${NEW}"
            fi
          } > /tmp/pr_body.md

      - name: Apply upstream changes as squash merge
        if: steps.state.outputs.updates == 'true'
        run: |
          set -eu

          git checkout main

          git merge --squash upstream/main || true

          # renovate.json: immer Fork behalten
          if git ls-files -u | awk '{print $4}' | grep -qx "renovate.json"; then
            git checkout --ours renovate.json
            git add renovate.json
          fi

          # Rest: Upstream gewinnt
          if git ls-files -u | grep -q .; then
            git checkout --theirs .
            git add .
          fi

          # Overrides behalten
          git restore --source=HEAD custom-override || true
          git add custom-override || true

          # State-Datei aktualisieren
          mkdir -p .github
          echo "${{ steps.state.outputs.new_upstream }}" > .github/upstream-main.sha
          git add .github/upstream-main.sha

          # Keine Änderungen? => Abbruch (und PR-Step wird durch if ebenfalls übersprungen)
          if git diff --quiet; then
            echo "No file changes after squash -> nothing to PR."
            exit 0
          fi

          git commit -m "chore: sync upstream opencloud-compose"

      - name: Create or update PR
        if: steps.state.outputs.updates == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: update-from-upstream
          base: main
          title: Sync upstream opencloud-compose
          body-path: /tmp/pr_body.md
          labels: upstream-update
          assignees: reniko
          delete-branch: false
