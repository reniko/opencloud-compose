services:
  collabora:
    environment:
      extra_params: >
        --o:ssl.enable=${COLLABORA_SSL_ENABLE:-true}
        --o:ssl.ssl_verification=${COLLABORA_SSL_VERIFICATION:-true}
        --o:ssl.termination=true
        --o:welcome.enable=false
        --o:net.frame_ancestors=${OC_DOMAIN:-cloud.opencloud.test}${TRAEFIK_PORT_HTTPS:+:}${TRAEFIK_PORT_HTTPS:-}
        --o:net.lok_allow.host[14]=${OC_DOMAIN:-cloud.opencloud.test}${TRAEFIK_PORT_HTTPS:+:}${TRAEFIK_PORT_HTTPS:-}
        --o:home_mode.enable=${COLLABORA_HOME_MODE:-false}
        --o:hexify_embedded_urls=true
    networks:
      pangolin:
      opencloud-net:

  opencloud:
    networks:
      pangolin:
      opencloud-net:
    ports:
      - 127.0.0.1:9200:9200 # local opencloud for webdav

  collaboration:
    networks:
      pangolin:
      opencloud-net:

  keycloak:
    networks:
      pangolin:
      opencloud-net:

  postgres:
    volumes:
      - ${KC_CUSTOM_DB_PATH:-keycloak_postgres_data}:/var/lib/postgresql/data
    networks:
      pangolin:
      db-backup:

  backup:
    image: alpine:latest
    restart: unless-stopped
    networks:
      - opencloud-net
      - monitoring
    depends_on:
      - postgres
      - ldap-server
    volumes:
      - ${BACKUP_DIR:-/opt/data/opencloud_backups}:/opt/data/backups
    environment:
      DB_HOST: postgres
      DB_NAME: keycloak
      DB_USER: ${KC_DB_USERNAME:-keycloak}
      DB_PASSWORD: ${KC_DB_PASSWORD}

      LDAP_HOST: ldap-server
      LDAP_PORT: "1636"
      LDAP_BIND_DN: "cn=admin,dc=opencloud,dc=eu"
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD}
      LDAP_BASE_DN: "dc=opencloud,dc=eu"

      UPTIME_KUMA_PUSH_URL: ${UPTIME_KUMA_PUSH_URL}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-3600}
      BACKUP_KEEP: ${BACKUP_KEEP:-3}

    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu

        require() { [ -n "$$1" ] || return 1; }

        apk add --no-cache postgresql-client openldap-clients curl >/dev/null
        export LDAPTLS_REQCERT=never

        while true; do
          TS=$$(date +"%Y%m%d%H%M%S")
          BACKUP_FAILED=0
          KEEP_FROM=$$(( $$BACKUP_KEEP + 1 ))

          if ! require "$$DB_PASSWORD" || ! require "$$LDAP_BIND_PASSWORD" || ! require "$$UPTIME_KUMA_PUSH_URL"; then
            BACKUP_FAILED=1
          else
            mkdir -p /opt/data/backups/postgres /opt/data/backups/ldap

            PG_TMP="/opt/data/backups/postgres/.keycloak-db-$${TS}.sql.gz.tmp"
            PG_FINAL="/opt/data/backups/postgres/keycloak-db-$${TS}.sql.gz"

            if PGPASSWORD="$$DB_PASSWORD" \
              pg_dump -h "$$DB_HOST" -U "$$DB_USER" "$$DB_NAME" \
              | gzip > "$$PG_TMP"
            then
              if [ -s "$$PG_TMP" ]; then
                mv "$$PG_TMP" "$$PG_FINAL"
              else
                rm -f "$$PG_TMP"
                BACKUP_FAILED=1
              fi
            else
              rm -f "$$PG_TMP"
              BACKUP_FAILED=1
            fi

            LDAP_TMP="/opt/data/backups/ldap/.ldap-$${TS}.ldif.tmp"
            LDAP_FINAL="/opt/data/backups/ldap/ldap-$${TS}.ldif"

            if ldapsearch -x \
              -H "ldaps://$$LDAP_HOST:$$LDAP_PORT" \
              -D "$$LDAP_BIND_DN" -w "$$LDAP_BIND_PASSWORD" \
              -b "$$LDAP_BASE_DN" -LLL "(objectClass=*)" \
              > "$$LDAP_TMP"
            then
              if [ -s "$$LDAP_TMP" ]; then
                mv "$$LDAP_TMP" "$$LDAP_FINAL"
              else
                rm -f "$$LDAP_TMP"
                BACKUP_FAILED=1
              fi
            else
              rm -f "$$LDAP_TMP"
              BACKUP_FAILED=1
            fi

            ls -1t /opt/data/backups/postgres/keycloak-db-*.sql.gz 2>/dev/null \
              | tail -n +"$$KEEP_FROM" \
              | xargs -r rm -f

            ls -1t /opt/data/backups/ldap/ldap-*.ldif 2>/dev/null \
              | tail -n +"$$KEEP_FROM" \
              | xargs -r rm -f
          fi

          if [ "$$BACKUP_FAILED" -eq 0 ]; then
            curl -fsS --retry 3 "$$UPTIME_KUMA_PUSH_URL" >/dev/null || true
          else
            curl -fsS --retry 3 "$$UPTIME_KUMA_PUSH_URL?status=down" >/dev/null || true
          fi

          sleep "$$BACKUP_INTERVAL_SECONDS"
        done

networks:
  pangolin:
    name: pangolin
    external: true
  monitoring:
    name: monitoring
    external: true
  db-backup:
    name: db-backup
    external: true